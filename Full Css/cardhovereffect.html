<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Hover Effect</title>
    <link rel="stylesheet" href="cardhovereffect.css">
</head>
<body>

    <div class="container">

        <div class="card">
            <img src="https://picsum.photos/300/200" alt="Image">
            <div class="content">
                <h2>Nature</h2>
                <p>
                    Discover the beauty of nature with amazing landscapes,
                    mountains, forests, and rivers.
                </p>
                <a href="#">Read More</a>
            </div>
        </div>

    </div>

</body>
</html>
